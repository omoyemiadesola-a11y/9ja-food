<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Chicken Demo | Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="nav-desktop">
    <div class="container nav-inner">
      <a href="index.html" class="brand">Mega Chicken Demo</a>
      <nav class="nav-links">
        <a href="index.html" data-link="index.html">Home</a>
        <a href="menu.html" data-link="menu.html">Menu</a>
        <a href="order.html" data-link="order.html">Order</a>
        <a href="locations.html" data-link="locations.html">Locations</a>
        <a href="about.html" data-link="about.html">About</a>
        <a href="contact.html" data-link="contact.html">Contact</a>
      </nav>
      <a href="menu.html" class="btn btn-secondary">View Menu</a>
    </div>
  </header>

  <main class="container section split">
    <section>
      <h1>Your Cart (Demo)</h1>
      <p>Adjust quantities and review your total before placing a demo order.</p>
      <div id="cart-list" class="cart-list" style="margin-top:1rem"></div>
    </section>

    <section class="card" style="align-self:start">
      <h2>Checkout</h2>
      <form class="form-grid" data-demo-submit>
        <input class="input" type="text" placeholder="Full Name" required>
        <input class="input" type="tel" placeholder="Phone Number" required>
        <select>
          <option>Delivery</option>
          <option>Pickup</option>
        </select>
        <div class="inline-space">
          <strong>Total</strong>
          <strong id="cart-total">$0.00</strong>
        </div>
        <button class="btn btn-primary" type="submit">Place Order</button>
      </form>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" data-link="index.html">Home</a>
    <a href="menu.html" data-link="menu.html">Menu</a>
    <a href="order.html" data-link="order.html">Order</a>
    <a href="locations.html" data-link="locations.html">Locations</a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
