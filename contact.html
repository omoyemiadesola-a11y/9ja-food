<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Chicken Demo | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="nav-desktop">
    <div class="container nav-inner">
      <a href="index.html" class="brand">Mega Chicken Demo</a>
      <nav class="nav-links">
        <a href="index.html" data-link="index.html">Home</a>
        <a href="menu.html" data-link="menu.html">Menu</a>
        <a href="order.html" data-link="order.html">Order</a>
        <a href="locations.html" data-link="locations.html">Locations</a>
        <a href="about.html" data-link="about.html">About</a>
        <a href="contact.html" data-link="contact.html">Contact</a>
      </nav>
      <a href="order.html" class="btn btn-primary">Order Now</a>
    </div>
  </header>

  <main class="container section split">
    <section>
      <h1>Contact Us</h1>
      <p>Need support, catering info, or branch updates? Reach out anytime.</p>
      <div class="card" style="margin-top:1rem">
        <p><strong>Phone:</strong> +234 800 000 0000</p>
        <p><strong>Email:</strong> hello@megachickendemo.com</p>
        <p><strong>Address:</strong> 22 Allen Avenue, Ikeja, Lagos</p>
        <div class="hero-actions" style="margin-top:.8rem">
          <button class="btn btn-primary" type="button">Call Now</button>
          <button class="btn btn-ghost" type="button">WhatsApp (Demo)</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Send a Message</h2>
      <form class="form-grid" data-demo-submit>
        <input class="input" type="text" placeholder="Your Name" required>
        <input class="input" type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Type your message" required></textarea>
        <button class="btn btn-primary" type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" data-link="index.html">Home</a>
    <a href="menu.html" data-link="menu.html">Menu</a>
    <a href="order.html" data-link="order.html">Order</a>
    <a href="locations.html" data-link="locations.html">Locations</a>
  </nav>
