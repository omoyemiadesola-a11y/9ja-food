<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Chicken Demo | Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="nav-desktop">
    <div class="container nav-inner">
      <a href="index.html" class="brand">Mega Chicken Demo</a>
      <nav class="nav-links">
        <a href="index.html" data-link="index.html">Home</a>
        <a href="menu.html" data-link="menu.html">Menu</a>
        <a href="order.html" data-link="order.html">Order</a>
        <a href="locations.html" data-link="locations.html">Locations</a>
        <a href="about.html" data-link="about.html">About</a>
        <a href="contact.html" data-link="contact.html">Contact</a>
      </nav>
      <a href="order.html" class="btn btn-primary">Order Now</a>
    </div>
  </header>

  <main class="container section">
    <h1>Explore Our Menu</h1>
    <p>Search and filter by category, type, and popularity. Demo prices only.</p>

    <div class="search-bar" style="margin-top:1rem">
      <input id="menu-search" type="search" placeholder="Search for rice, chicken, pizza...">
      <a href="order.html" class="btn btn-primary">Order Now</a>
    </div>

    <div class="tabs">
      <button class="tab active" data-category="All">All</button>
      <button class="tab" data-category="African">African</button>
      <button class="tab" data-category="Chinese">Chinese</button>
      <button class="tab" data-category="Fast Food">Fast Food</button>
      <button class="tab" data-category="Pizza">Pizza</button>
      <button class="tab" data-category="Bakery">Bakery</button>
      <button class="tab" data-category="Breakfast">Breakfast</button>
    </div>

    <div class="filters">
      <button class="filter-chip active" data-filter="all">All Types</button>
      <button class="filter-chip" data-filter="rice">Rice</button>
      <button class="filter-chip" data-filter="chicken">Chicken</button>
      <button class="filter-chip" data-filter="snacks">Snacks</button>
      <button class="filter-chip" data-filter="pizza">Pizza</button>
      <button class="filter-chip" data-filter="breakfast">Breakfast</button>
      <button class="filter-chip" data-filter="popular">Popular</button>
    </div>

    <section id="menu-grid" class="grid menu-grid"></section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" data-link="index.html">Home</a>
    <a href="menu.html" data-link="menu.html">Menu</a>
    <a href="order.html" data-link="order.html">Order</a>
    <a href="locations.html" data-link="locations.html">Locations</a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
